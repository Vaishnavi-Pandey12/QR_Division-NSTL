{% extends 'layouts/base.html' %}{% block content %}<h1 class="page-title">Report Types</h1><form method="POST" action="{{ url_for('admin.edit_report_type', report_type_id=edit_type._id) if edit_type else url_for('admin.report_types') }}" class="card p-4 mb-4"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="row g-3"><div class="col-md-4"><input name="name" class="form-control" placeholder="Report Type" value="{{ edit_type.name if edit_type else '' }}" required></div><div class="col-md-4"><input name="sub_type" class="form-control" placeholder="Sub Report Type" value="{{ edit_type.sub_type if edit_type else '' }}"></div><div class="col-md-4"><input name="description" class="form-control" placeholder="Details" value="{{ edit_type.description if edit_type else '' }}"></div></div><button class="btn btn-primary mt-3">{{ 'Update' if edit_type else 'Create' }}</button></form><div class="card p-3"><table class="table"><thead><tr><th>Report Type</th><th>Sub Report Type</th><th>Details</th><th>Actions</th></tr></thead><tbody>{% for r in report_types %}<tr><td>{{ r.name }}</td><td>{{ r.sub_type }}</td><td>{{ r.description }}</td><td><a class="btn btn-sm btn-outline-primary" href="{{ url_for('admin.edit_report_type', report_type_id=r._id) }}">Edit</a><form class="d-inline" method="POST" action="{{ url_for('admin.delete_report_type', report_type_id=r._id) }}"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="btn btn-sm btn-outline-danger">Delete</button></form></td></tr>{% endfor %}</tbody></table></div>{% endblock %}
