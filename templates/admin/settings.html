{% extends 'layouts/base.html' %}{% block content %}<h1 class="page-title">Report Types</h1><form method="POST" class="card p-4 mb-4"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="row g-3"><div class="col-md-4"><input name="name" class="form-control" placeholder="Report Type" required></div><div class="col-md-4"><input name="sub_type" class="form-control" placeholder="Sub Report Type"></div><div class="col-md-4"><input name="description" class="form-control" placeholder="Details"></div></div><button class="btn btn-primary mt-3">Create</button></form><div class="card p-3"><table class="table"><thead><tr><th>Report Type</th><th>Sub Report Type</th><th>Details</th><th>Actions</th></tr></thead><tbody>{% for r in report_types %}<tr><td>{{ r.name }}</td><td>{{ r.sub_type }}</td><td>{{ r.description }}</td><td><button class="btn btn-sm btn-outline-primary">View Details</button><button class="btn btn-sm btn-outline-secondary">Edit</button><button class="btn btn-sm btn-outline-danger">Delete</button></td></tr>{% endfor %}</tbody></table></div>{% endblock %}
