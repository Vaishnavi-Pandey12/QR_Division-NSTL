{% extends 'layouts/base.html' %}{% block content %}<div class="d-flex justify-content-between align-items-center"><h1 class="page-title">Users</h1><a class="btn btn-primary" href="{{ url_for('admin.create_user') }}">Create User</a></div><div class="card p-3"><table class="table align-middle"><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead><tbody>{% for u in users %}<tr><td>{{ u.name }}</td><td>{{ u.email }}</td><td><span class="badge bg-primary">{{ u.role }}</span></td><td>{{ 'Active' if u.is_active else 'Disabled' }}</td><td><a class="btn btn-sm btn-outline-primary" href="{{ url_for('admin.edit_user', user_id=u._id) }}">Edit</a><form class="d-inline" method="POST" action="{{ url_for('admin.deactivate_user' if u.is_active else 'admin.activate_user', user_id=u._id) }}"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="btn btn-sm btn-outline-warning">{{ 'Deactivate' if u.is_active else 'Activate' }}</button></form><form class="d-inline" method="POST" action="{{ url_for('admin.reset_password', user_id=u._id) }}"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><input name="password" placeholder="New password" required><button class="btn btn-sm btn-outline-danger">Reset</button></form></td></tr>{% endfor %}</tbody></table></div>{% endblock %}
