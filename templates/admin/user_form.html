{% extends 'layouts/base.html' %}{% block content %}<h1 class="page-title">{{ 'Edit' if user else 'Create' }} User</h1><form class="card p-4" method="POST"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><input name="name" class="form-control mb-3" value="{{ user.name if user else '' }}" placeholder="Name" required><input type="email" name="email" class="form-control mb-3" value="{{ user.email if user else '' }}" placeholder="Email" required><input name="phone" class="form-control mb-3" value="{{ user.phone if user else '' }}" placeholder="Phone"><select name="role" class="form-select mb-3">{% for role in roles %}<option value="{{ role }}" {{ 'selected' if user and user.role == role else '' }}>{{ role|title }}</option>{% endfor %}</select>{% if not user %}<input type="password" name="password" class="form-control mb-3" placeholder="Password" required>{% else %}<div class="form-check mb-3"><input class="form-check-input" type="checkbox" name="is_active" id="active" {{ 'checked' if user.is_active else '' }}><label class="form-check-label" for="active">Active</label></div>{% endif %}<button class="btn btn-primary">Save</button></form>{% endblock %}
