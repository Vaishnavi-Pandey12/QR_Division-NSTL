<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PDF Viewer</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body{
            margin:0;
            background:#e9edf5;
            overflow:hidden;
            font-family:Segoe UI,Arial,sans-serif;
        }

        .viewer-header{
            height:60px;
            background:white;
            display:flex;
            align-items:center;
            gap:10px;
            padding:0 25px;
            border-bottom:1px solid #d6dbe6;
        }

        #pdf-container{
            height:calc(100vh - 60px);
            overflow:auto;

            display:flex;
            justify-content:center;
            align-items:flex-start;

            padding:30px;
        }

        #pdf-render{
            background:white;
            box-shadow:0 10px 30px rgba(0,0,0,.18);
            border-radius:4px;
        }

        body{
            margin:0;
            background:#e9edf5;
            font-family:Segoe UI,Arial,sans-serif;
        }

        .pdf-topbar{
            height:70px;
            background:#1f355e;
            color:white;

            display:flex;
            align-items:center;
            justify-content:space-between;

            padding:0 30px;

            box-shadow:0 2px 10px rgba(0,0,0,.15);
        }

        .pdf-topbar h3{
            margin:0;
            font-weight:600;
        }

        .back-btn{
            color:white;
            text-decoration:none;
            font-size:15px;
            padding:8px 15px;
            border:1px solid rgba(255,255,255,.4);
            border-radius:6px;
        }

        .back-btn:hover{
            background:white;
            color:#1f355e;
        }

        .pdf-content{
            padding:25px;
        }

    </style>

</head>

<body>

<div class="pdf-topbar">

    <h3>AI-Based Central Report Management System</h3>

    <a class="back-btn"
       href="{{ url_for('user.search') }}">
        ← Back
    </a>

</div>

<div class="pdf-content">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
