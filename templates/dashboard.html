<!DOCTYPE html>
<html>

<head>

    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static',
          filename='dashboard.css') }}">

</head>

<body>

    <div class="wrapper">

        <!-- Sidebar -->

        <div class="sidebar">

            <div class="logo">
                My Portal
            </div>

            <ul>

                <li>
                    <i class="fas fa-chart-pie"></i>
                    Dashboard
                </li>

                <li>
                    <i class="fas fa-search"></i>
                    Search
                </li>

                <li>
                    <i class="fas fa-upload"></i>
                    Upload
                </li>

                <li>
                    <i class="fas fa-check"></i>
                    Approval
                </li>

                <li>
                    <i class="fas fa-robot"></i>
                    AI Agent
                </li>

            </ul>

        </div>

        <!-- Main Content -->

        <div class="main-content">

            <div class="topbar">

                <div class="dropdown">

                    <div class="profile-section" data-bs-toggle="dropdown">

                        <img src="{{ url_for('static',
                     filename='images/profile.png') }}" class="profile-img">

                        <span class="user-name">
                            {{ name }}
                        </span>

                        <i class="fas fa-chevron-down"></i>

                    </div>

                    <ul class="dropdown-menu dropdown-menu-end">

                        <li>
                            <a class="dropdown-item" href="#">

                                <i class="fas fa-user me-2"></i>
                                Profile

                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item" href="#">

                                <i class="fas fa-cog me-2"></i>
                                Settings

                            </a>
                        </li>

                        <li>
                            <hr class="dropdown-divider">
                        </li>

                        <li>
                            <a class="dropdown-item text-danger" href="/logout">

                                <i class="fas fa-sign-out-alt me-2"></i>
                                Logout

                            </a>
                        </li>

                    </ul>

                </div>

            </div>

            <div class="content">

                <div class="card shadow-sm p-4">

                    <h1>Upload</h1>

                    <form>

                        <input class="form-control mb-3" placeholder="Document Title">

                        <div class="row">

                            <div class="col-md-6">

                                <input class="form-control mb-3" placeholder="Document Number">

                            </div>

                            <div class="col-md-6">

                                <select class="form-select mb-3">

                                    <option>
                                        Select Year
                                    </option>

                                </select>

                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6">

                                <input class="form-control mb-3" placeholder="Author">

                            </div>

                            <div class="col-md-6">

                                <input class="form-control mb-3" placeholder="Author Email">

                            </div>

                        </div>

                        <button class="btn btn-primary">

                            Upload

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
