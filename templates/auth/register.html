<!doctype html><html><head><title>First Admin Setup</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet"><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head><body><div class="glass-card"><div class="text-center mb-4"><i class="fas fa-user-shield login-icon"></i><h2>First Admin Setup</h2></div>{% with messages=get_flashed_messages(with_categories=true) %}{% for c,m in messages %}<div class="alert alert-{{ c }}">{{ m }}</div>{% endfor %}{% endwith %}<form method="POST"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><input name="name" class="form-control mb-3" placeholder="Full Name" required><input type="email" name="email" class="form-control mb-3" placeholder="Email" required><input name="phone" class="form-control mb-3" placeholder="Phone"><input type="password" name="password" class="form-control mb-3" placeholder="Password" required><input type="password" name="confirm" class="form-control mb-3" placeholder="Confirm Password" required><button class="btn btn-success w-100 login-btn">Create Admin</button></form></div></body></html>
