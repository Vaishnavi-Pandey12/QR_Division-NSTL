<!doctype html><html><head><title>Login</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet"><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head><body><div class="glass-card"><div class="text-center mb-4"><i class="fas fa-user-circle login-icon"></i><h2>Login</h2></div>{% with messages=get_flashed_messages(with_categories=true) %}{% for c,m in messages %}<div class="alert alert-{{ c }}">{{ m }}</div>{% endfor %}{% endwith %}<form method="POST"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><div class="input-group mb-3"><span class="input-group-text"><i class="fas fa-envelope"></i></span><input name="identifier" class="form-control" placeholder="Email or Phone Number" required></div><div class="input-group mb-3"><span class="input-group-text"><i class="fas fa-lock"></i></span><input type="password" name="password" class="form-control" placeholder="Password" required></div><button class="btn btn-primary w-100 login-btn">Login</button></form>{% if not admin_exists %}<div class="text-center mt-4"><a href="{{ url_for('auth.register') }}" class="small-link">Create first admin account</a></div>{% endif %}</div></body></html>
